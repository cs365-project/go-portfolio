<!DOCTYPE html>
<!-- E2E test trigger -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Portfolio - CS365</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            /* เปลี่ยนมาใช้ System Font Stack ตัดปัญหาเรื่อง Internet */
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }
        
        .container { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.2); 
            max-width: 700px; 
            width: 90%;
            text-align: center; 
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(-20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        h1 { 
            color: #2d3748; 
            margin-bottom: 10px; 
            font-weight: 600; 
            letter-spacing: -0.5px;
        }
        
        .subtitle { 
            color: #4a5568; 
            margin-bottom: 30px; 
            font-size: 1.1em; 
        }

        .team-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .member-card {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            flex: 1;
            min-width: 250px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .member-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
        }

        .member-icon { 
            font-size: 3rem; 
            margin-bottom: 10px; 
        }

        .member-name { 
            font-size: 1.2em; 
            font-weight: 600; 
            color: #2b6cb0; 
            margin-bottom: 5px; 
        }

        .member-role { 
            font-size: 0.9em; 
            color: #718096; 
        }

        .role-badge {
            display: inline-block;
            background: #ebf4ff;
            color: #3182ce;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8em;
            margin-top: 12px;
            font-weight: 600;
        }

        hr { 
            border: none; 
            border-top: 1px solid #e2e8f0; 
            margin: 20px 0; 
        }

        .footer-text { 
            font-size: 0.85em; 
            color: #a0aec0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
        }

        .status-dot { 
            height: 10px; 
            width: 10px; 
            background-color: #48bb78; 
            border-radius: 50%; 
            display: inline-block; 
            animation: pulse 2s infinite; 
        }

        @keyframes pulse { 
            0% { box-shadow: 0 0 0 0 rgba(72, 187, 120, 0.7); } 
            70% { box-shadow: 0 0 0 10px rgba(72, 187, 120, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(72, 187, 120, 0); } 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Team Portfolio</h1>
        <p class="subtitle">CS365 - Go Web Application via GitOps</p>

        <div class="team-container">
            <div class="member-card">
                <div class="member-icon">👨🏻‍💻</div>
                <div class="member-name">หนุ่ม</div>
                <div class="member-role">Infrastructure & CI/CD Specialist</div>
                <span class="role-badge">AWS / Terraform</span>
            </div>
            
            <div class="member-card">
                <div class="member-icon">👨🏻‍💻</div>
                <div class="member-name">มิว</div>
                <div class="member-role">App Developer & Docker Specialist</div>
                <span class="role-badge">Go / Docker</span>
            </div>
        </div>

        <hr>
        <div class="footer-text">
            <span class="status-dot"></span> Automated CI/CD Pipeline running successfully.
        </div>
    </div>
</body>
</html>
